name: ai CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'ai/**'   # Only run if ai changes
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ai:latest ./ai

      - name: Test image
        run: |
          docker run -d -p 5000:5000 --name test-ai ai:latest
          sleep 5
          curl -f http://localhost:5000 || exit 1
          docker stop test-ai
          docker rm test-ai

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test   # won't run if build fails

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /opt/payroll-app/ai",
              "git pull origin main",
              "docker build -t ai:latest .",
              "docker stop ai || true",
              "docker rm ai || true",
              "docker run -d -p 5000:5000 --name ai ai:latest",
              "sleep 5",
              "curl -f http://localhost:5000"
            ]' \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }}

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query "Status" \
            --output text)

          echo "Deployment status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1