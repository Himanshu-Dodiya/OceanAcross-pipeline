name: Backend CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - 'backend/**'   # Only run if backend changes
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t backend:latest ./backend

      - name: Test image
        run: |
          docker run -d -p 3000:3000 --name test-backend backend:latest
          sleep 5
          curl -f http://localhost:3000 || exit 1
          docker stop test-backend
          docker rm test-backend

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-test   # won't run if build fails
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy via SSM
        run: |
          BRANCH="${{ github.ref_name }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /opt/payroll-app/backend",
              "git pull origin '"$BRANCH"'",
              "docker build -t backend:latest .",
              "docker stop backend || true",
              "docker rm backend || true",
              "docker run -d -p 3000:3000 --name backend backend:latest",
              "sleep 5",
              "curl -f http://localhost:3000"
            ]' \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }}

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query "Status" \
            --output text)

          echo "Deployment status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev # won't run if build fails
    if: github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy via SSM
        run: |
          BRANCH="${{ github.ref_name }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /opt/payroll-app/backend",
              "git pull origin '"$BRANCH"'",
              "docker build -t backend:latest .",
              "docker stop backend || true",
              "docker rm backend || true",
              "docker run -d -p 3000:3000 --name backend backend:latest",
              "sleep 5",
              "curl -f http://localhost:3000"
            ]' \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }}

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query "Status" \
            --output text)

          echo "Deployment status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1